name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build LurkAway.app
        run: |
          xcodebuild \
            -project LurkAway.xcodeproj \
            -scheme LurkAway \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package as zip
        run: |
          APP="$(find build/Build/Products/Release -maxdepth 1 -name 'LurkAway.app' -print -quit)"
          test -n "$APP" || { echo "LurkAway.app not found"; exit 1; }
          ditto -c -k --keepParent "$APP" LurkAway.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" LurkAway.zip --clobber
